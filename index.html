<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="パシャ — レシート撮って経費完了。電子帳簿保存法対応。">
<link rel="manifest" href="manifest.json">
<title>パシャ — レシート経費管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--card:#16213e;
  --primary:#4cc9f0;--accent:#f72585;--text:#e8e8e8;--dim:#888;
  --success:#06d6a0;--warn:#ffd60a;
  --radius:16px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}

/* Header */
.header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.logo{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--primary)}
.header-actions{display:flex;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.icon-btn:active{transform:scale(.92)}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Pages */
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px}
.page.active{display:block}

/* Stats bar */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--primary)}
.stat-label{font-size:11px;color:var(--dim);margin-top:2px}

/* Receipt list */
.receipt-list{display:flex;flex-direction:column;gap:8px}
.receipt-item{background:var(--card);border-radius:var(--radius);padding:14px;display:flex;gap:12px;cursor:pointer;transition:.2s;position:relative}
.receipt-item:active{transform:scale(.98)}
.receipt-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;background:var(--surface);flex-shrink:0}
.receipt-info{flex:1;min-width:0}
.receipt-vendor{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.receipt-meta{font-size:12px;color:var(--dim);margin-top:3px}
.receipt-amount{font-size:18px;font-weight:700;color:var(--warn);text-align:right;white-space:nowrap}
.receipt-category{font-size:10px;background:rgba(76,201,240,.15);color:var(--primary);padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}
.receipt-status{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--success)}
.receipt-status.unverified{background:var(--warn)}

/* Capture button */
.capture-btn{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));border:4px solid var(--bg);box-shadow:0 4px 24px rgba(247,37,133,.4);cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;transition:.2s}
.capture-btn:active{transform:translateX(-50%) scale(.9)}
.capture-btn svg{width:32px;height:32px;fill:#fff}

/* Camera view */
.camera-view{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column}
.camera-view.active{display:flex}
.camera-video{flex:1;object-fit:cover;background:#000}
.camera-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.camera-guide{width:85%;max-width:360px;aspect-ratio:3/2;border:2px dashed rgba(255,255,255,.4);border-radius:12px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:14px}
.camera-controls{position:absolute;bottom:0;left:0;right:0;padding:24px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(transparent,rgba(0,0,0,.8))}
.camera-close{width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer}
.camera-shutter{width:72px;height:72px;border-radius:50%;border:4px solid #fff;background:transparent;cursor:pointer;position:relative}
.camera-shutter::after{content:'';position:absolute;inset:6px;border-radius:50%;background:#fff;transition:.15s}
.camera-shutter:active::after{transform:scale(.85)}
.camera-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:10}

/* Detail modal */
.modal{position:fixed;inset:0;background:var(--bg);z-index:150;display:none;flex-direction:column}
.modal.active{display:flex}
.modal-header{padding:12px 16px;display:flex;align-items:center;gap:12px;background:var(--surface);border-bottom:1px solid rgba(255,255,255,.06)}
.modal-header h2{font-size:17px;flex:1}
.modal-body{flex:1;overflow-y:auto;padding:16px}
.modal-img{width:100%;border-radius:var(--radius);margin-bottom:16px;max-height:40vh;object-fit:contain;background:var(--surface)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:var(--card);color:var(--text);font-size:15px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:12px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:.2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#000}
.btn-danger{background:rgba(247,37,133,.15);color:var(--accent);margin-top:8px}
.btn-export{background:rgba(76,201,240,.12);color:var(--primary);margin-top:8px}

/* Hash badge */
.hash-badge{font-size:10px;color:var(--dim);background:rgba(255,255,255,.05);padding:6px 10px;border-radius:8px;word-break:break-all;margin-top:8px;font-family:monospace}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:var(--card);color:var(--text);font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--primary)}

/* Settings */
.setting-item{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.setting-info{flex:1}
.setting-info h3{font-size:15px;font-weight:600}
.setting-info p{font-size:12px;color:var(--dim);margin-top:2px}
.toggle{width:48px;height:28px;border-radius:14px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;transition:.2s}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on::after{left:23px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty h3{font-size:18px;color:var(--text);margin-bottom:8px}

/* Month filter */
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.month-nav button{background:none;border:none;color:var(--primary);font-size:20px;cursor:pointer;padding:4px 8px}
.month-label{font-size:16px;font-weight:600;min-width:120px;text-align:center}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.receipt-item{animation:fadeIn .3s ease}
@keyframes flash{0%{opacity:0}10%{opacity:.8}100%{opacity:0}}

/* Scrollbar */
::-webkit-scrollbar{width:0}
</style>
<script defer src="https://enabler-analytics.fly.dev/t.js"></script>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo"><span>パシャ</span></div>
    <div class="header-actions">
      <button class="icon-btn" onclick="exportData()" title="エクスポート">↓</button>
      <button class="icon-btn" onclick="showTab('settings')" title="設定">⚙</button>
    </div>
  </header>

  <nav class="tabs">
    <div class="tab active" data-tab="home" onclick="showTab('home')">ホーム</div>
    <div class="tab" data-tab="search" onclick="showTab('search')">検索</div>
    <div class="tab" data-tab="settings" onclick="showTab('settings')">設定</div>
  </nav>

  <!-- Home -->
  <div class="page active" id="page-home">
    <div class="stats">
      <div class="stat-card"><div class="stat-val" id="stat-count">0</div><div class="stat-label">今月の件数</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-total">¥0</div><div class="stat-label">今月の合計</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-all">0</div><div class="stat-label">全件数</div></div>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="receipt-list" id="receipt-list"></div>
  </div>

  <!-- Search -->
  <div class="page" id="page-search">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="取引先・金額・メモで検索..." oninput="doSearch()">
    </div>
    <div class="receipt-list" id="search-results"></div>
  </div>

  <!-- Settings -->
  <div class="page" id="page-settings">
    <div class="setting-item">
      <div class="setting-info">
        <h3>電子帳簿保存法モード</h3>
        <p>タイムスタンプ・改ざん検知を有効化</p>
      </div>
      <div class="toggle on" id="toggle-compliance" onclick="toggleSetting('compliance')"></div>
    </div>
    <div class="setting-item">
      <div class="setting-info">
        <h3>撮影ガイド表示</h3>
        <p>カメラにレシート枠ガイドを表示</p>
      </div>
      <div class="toggle on" id="toggle-guide" onclick="toggleSetting('guide')"></div>
    </div>
    <div class="setting-item">
      <div class="setting-info">
        <h3>データ件数</h3>
        <p id="data-count">0件保存中</p>
      </div>
    </div>
    <button class="btn btn-export" onclick="exportData()">CSVエクスポート</button>
    <button class="btn btn-export" onclick="exportJSON()">JSONエクスポート（バックアップ）</button>
    <button class="btn btn-danger" onclick="clearAll()">全データ削除</button>
    <div style="text-align:center;margin-top:24px;color:var(--dim);font-size:12px">
      パシャ v1.0 — 電子帳簿保存法対応レシート管理<br>
      データはすべてこの端末内に保存されます
    </div>
  </div>

  <!-- Capture button -->
  <button class="capture-btn" onclick="openCamera()">
    <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
  </button>

  <!-- Camera view -->
  <div class="camera-view" id="camera-view">
    <video class="camera-video" id="camera-video" autoplay playsinline></video>
    <div class="camera-overlay">
      <div class="camera-guide" id="camera-guide">レシートを枠内に合わせてください</div>
    </div>
    <div class="camera-flash" id="camera-flash"></div>
    <div class="camera-controls">
      <button class="camera-close" onclick="closeCamera()">✕</button>
      <button class="camera-shutter" onclick="capture()"></button>
      <div style="width:44px"></div>
    </div>
  </div>

  <!-- Detail modal -->
  <div class="modal" id="detail-modal">
    <div class="modal-header">
      <button class="icon-btn" onclick="closeDetail()" style="font-size:16px">←</button>
      <h2>レシート詳細</h2>
      <button class="icon-btn" onclick="deleteReceipt()" style="font-size:14px;color:var(--accent)">🗑</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<canvas id="capture-canvas" style="display:none"></canvas>

<script>
// ===== DB (IndexedDB) =====
const DB_NAME='pasha_db',DB_VER=1,STORE='receipts';
let db;
function openDB(){
  return new Promise((resolve,reject)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        const s=d.createObjectStore(STORE,{keyPath:'id'});
        s.createIndex('date','date');
        s.createIndex('vendor','vendor');
        s.createIndex('amount','amount');
      }
    };
    r.onsuccess=e=>{db=e.target.result;resolve(db)};
    r.onerror=e=>reject(e);
  });
}
function dbPut(item){return new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).put(item);t.oncomplete=()=>res();t.onerror=e=>rej(e)})}
function dbDelete(id){return new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).delete(id);t.oncomplete=()=>res();t.onerror=e=>rej(e)})}
function dbGetAll(){return new Promise((res,rej)=>{const t=db.transaction(STORE,'readonly');const r=t.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})}
function dbGet(id){return new Promise((res,rej)=>{const t=db.transaction(STORE,'readonly');const r=t.objectStore(STORE).get(id);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})}

// ===== State =====
let allReceipts=[];
let currentMonth=new Date();
let currentDetailId=null;
let mediaStream=null;
const settings={compliance:true,guide:true};

// ===== SHA-256 Hash =====
async function sha256(data){
  const buf=new TextEncoder().encode(data);
  const hash=await crypto.subtle.digest('SHA-256',buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ===== Init =====
async function init(){
  await openDB();
  allReceipts=await dbGetAll();
  allReceipts.sort((a,b)=>new Date(b.date)-new Date(a.date));
  renderHome();
  updateSettings();
  document.getElementById('data-count').textContent=allReceipts.length+'件保存中';
}

// ===== Tabs =====
function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+name));
  if(name==='search')document.getElementById('search-input').focus();
}

// ===== Month nav =====
function changeMonth(dir){
  currentMonth.setMonth(currentMonth.getMonth()+dir);
  renderHome();
}

function getMonthStr(d){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'}
function getMonthKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}

// ===== Render Home =====
function renderHome(){
  const mk=getMonthKey(currentMonth);
  document.getElementById('month-label').textContent=getMonthStr(currentMonth);
  const filtered=allReceipts.filter(r=>r.date&&r.date.startsWith(mk));
  const total=filtered.reduce((s,r)=>s+(parseInt(r.amount)||0),0);
  document.getElementById('stat-count').textContent=filtered.length;
  document.getElementById('stat-total').textContent='¥'+total.toLocaleString();
  document.getElementById('stat-all').textContent=allReceipts.length;
  const list=document.getElementById('receipt-list');
  if(!filtered.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">📷</div><h3>レシートがありません</h3><p>下の撮影ボタンで追加しましょう</p></div>';
    return;
  }
  list.innerHTML=filtered.map(r=>receiptHTML(r)).join('');
}

function receiptHTML(r){
  const cat=r.category||'未分類';
  const verified=r.hash?'':'unverified';
  return `<div class="receipt-item" onclick="showDetail('${r.id}')">
    <img class="receipt-thumb" src="${r.thumbnail||'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'}" alt="">
    <div class="receipt-info">
      <div class="receipt-vendor">${esc(r.vendor||'未入力')}</div>
      <div class="receipt-meta">${r.date||'日付なし'}</div>
      <span class="receipt-category">${esc(cat)}</span>
    </div>
    <div style="text-align:right">
      <div class="receipt-amount">¥${(parseInt(r.amount)||0).toLocaleString()}</div>
      <div class="receipt-status ${verified}" title="${verified?'未検証':'検証済み'}"></div>
    </div>
  </div>`;
}

function esc(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// ===== Camera =====
async function openCamera(){
  const view=document.getElementById('camera-view');
  const video=document.getElementById('camera-video');
  try{
    mediaStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=mediaStream;
    view.classList.add('active');
    document.getElementById('camera-guide').style.display=settings.guide?'flex':'none';
  }catch(e){
    // Fallback: file input
    const input=document.createElement('input');
    input.type='file';input.accept='image/*';input.capture='environment';
    input.onchange=async(ev)=>{
      const file=ev.target.files[0];
      if(file){
        const dataUrl=await readFile(file);
        processImage(dataUrl);
      }
    };
    input.click();
  }
}

function closeCamera(){
  document.getElementById('camera-view').classList.remove('active');
  if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null}
}

function readFile(file){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)})}

async function capture(){
  const video=document.getElementById('camera-video');
  const canvas=document.getElementById('capture-canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);

  // Flash
  const flash=document.getElementById('camera-flash');
  flash.style.animation='flash .4s ease';
  setTimeout(()=>flash.style.animation='',500);

  const dataUrl=canvas.toDataURL('image/jpeg',0.85);
  closeCamera();
  processImage(dataUrl);
}

// ===== Process captured image =====
async function processImage(dataUrl){
  // Create thumbnail
  const thumb=await createThumbnail(dataUrl,120);
  const now=new Date();
  const id='r_'+now.getTime()+'_'+Math.random().toString(36).slice(2,6);
  const dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const timeStr=now.toTimeString().slice(0,8);

  // SHA-256 hash of image for tamper detection
  const hash=await sha256(dataUrl);

  const receipt={
    id,
    image:dataUrl,
    thumbnail:thumb,
    date:dateStr,
    time:timeStr,
    vendor:'',
    amount:'',
    category:'その他',
    memo:'',
    hash,
    created:now.toISOString(),
    modified:now.toISOString(),
    history:[{action:'作成',timestamp:now.toISOString(),hash}]
  };

  await dbPut(receipt);
  allReceipts.unshift(receipt);
  currentMonth=new Date(now.getFullYear(),now.getMonth(),1);
  renderHome();
  showDetail(id);
}

function createThumbnail(dataUrl,size){
  return new Promise(r=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const ratio=Math.min(size/img.width,size/img.height);
      c.width=img.width*ratio;c.height=img.height*ratio;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      r(c.toDataURL('image/jpeg',0.6));
    };
    img.src=dataUrl;
  });
}

// ===== Detail =====
async function showDetail(id){
  currentDetailId=id;
  const r=await dbGet(id);
  if(!r)return;
  const modal=document.getElementById('detail-modal');
  const body=document.getElementById('detail-body');
  const categories=['食費','交通費','消耗品費','交際費','通信費','家賃','水道光熱費','旅費','雑費','その他'];
  body.innerHTML=`
    <img class="modal-img" src="${r.image}" alt="レシート画像" onclick="window.open(this.src)">
    <div class="form-row">
      <div class="form-group">
        <label>日付（取引年月日）</label>
        <input type="date" id="d-date" value="${r.date}">
      </div>
      <div class="form-group">
        <label>金額（取引金額）</label>
        <input type="number" id="d-amount" value="${r.amount}" placeholder="0" inputmode="numeric">
      </div>
    </div>
    <div class="form-group">
      <label>取引先</label>
      <input type="text" id="d-vendor" value="${esc(r.vendor)}" placeholder="例: ローソン新宿店">
    </div>
    <div class="form-group">
      <label>勘定科目</label>
      <select id="d-category">${categories.map(c=>`<option${c===r.category?' selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="d-memo" placeholder="用途などを記入...">${esc(r.memo||'')}</textarea>
    </div>
    <button class="btn btn-primary" onclick="saveDetail()">保存</button>
    ${r.hash?`<div class="hash-badge">🔒 SHA-256: ${r.hash}<br>撮影: ${r.created}</div>`:''}
    ${r.history?`<div style="margin-top:12px;font-size:11px;color:var(--dim)"><strong>変更履歴:</strong><br>${r.history.map(h=>`${h.timestamp.slice(0,19).replace('T',' ')} — ${h.action}`).join('<br>')}</div>`:''}
  `;
  modal.classList.add('active');
  // Focus amount if empty
  if(!r.amount)setTimeout(()=>document.getElementById('d-amount').focus(),300);
}

async function saveDetail(){
  const r=await dbGet(currentDetailId);
  if(!r)return;
  const prev={date:r.date,amount:r.amount,vendor:r.vendor,category:r.category,memo:r.memo};
  r.date=document.getElementById('d-date').value;
  r.amount=document.getElementById('d-amount').value;
  r.vendor=document.getElementById('d-vendor').value;
  r.category=document.getElementById('d-category').value;
  r.memo=document.getElementById('d-memo').value;
  r.modified=new Date().toISOString();

  // Track changes for compliance
  const changes=[];
  if(prev.date!==r.date)changes.push('日付変更');
  if(prev.amount!==r.amount)changes.push('金額変更');
  if(prev.vendor!==r.vendor)changes.push('取引先変更');
  if(prev.category!==r.category)changes.push('科目変更');
  if(prev.memo!==r.memo)changes.push('メモ変更');
  if(changes.length){
    r.history=r.history||[];
    r.history.push({action:changes.join(', '),timestamp:r.modified,hash:r.hash});
  }

  await dbPut(r);
  const idx=allReceipts.findIndex(x=>x.id===r.id);
  if(idx>=0)allReceipts[idx]=r;
  renderHome();
  closeDetail();
}

function closeDetail(){document.getElementById('detail-modal').classList.remove('active');currentDetailId=null}

async function deleteReceipt(){
  if(!currentDetailId)return;
  if(!confirm('このレシートを削除しますか？'))return;
  await dbDelete(currentDetailId);
  allReceipts=allReceipts.filter(r=>r.id!==currentDetailId);
  renderHome();
  closeDetail();
  document.getElementById('data-count').textContent=allReceipts.length+'件保存中';
}

// ===== Search =====
function doSearch(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const container=document.getElementById('search-results');
  if(!q){container.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><h3>検索条件を入力</h3><p>取引先・金額・日付・メモで検索</p></div>';return}
  const results=allReceipts.filter(r=>{
    return (r.vendor&&r.vendor.toLowerCase().includes(q))
      ||(r.amount&&r.amount.toString().includes(q))
      ||(r.date&&r.date.includes(q))
      ||(r.memo&&r.memo.toLowerCase().includes(q))
      ||(r.category&&r.category.includes(q));
  });
  if(!results.length){container.innerHTML='<div class="empty"><div class="empty-icon">🤷</div><h3>該当なし</h3></div>';return}
  container.innerHTML=results.map(r=>receiptHTML(r)).join('');
}

// ===== Export =====
function exportData(){
  if(!allReceipts.length){alert('データがありません');return}
  const bom='\ufeff';
  const header='日付,取引先,金額,勘定科目,メモ,撮影日時,SHA-256\n';
  const rows=allReceipts.map(r=>`${r.date},"${(r.vendor||'').replace(/"/g,'""')}",${r.amount||0},${r.category||''},"${(r.memo||'').replace(/"/g,'""')}",${r.created||''},${r.hash||''}`).join('\n');
  const blob=new Blob([bom+header+rows],{type:'text/csv;charset=utf-8'});
  dl(blob,'pasha_export_'+today()+'.csv');
}

function exportJSON(){
  if(!allReceipts.length){alert('データがありません');return}
  const data=allReceipts.map(r=>({...r,image:undefined,thumbnail:undefined}));
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  dl(blob,'pasha_backup_'+today()+'.json');
}

function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function today(){const d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')}

function clearAll(){
  if(!confirm('全データを削除しますか？この操作は元に戻せません。'))return;
  if(!confirm('本当に削除してよろしいですか？'))return;
  const t=db.transaction(STORE,'readwrite');
  t.objectStore(STORE).clear();
  t.oncomplete=()=>{allReceipts=[];renderHome();document.getElementById('data-count').textContent='0件保存中'};
}

// ===== Settings =====
function toggleSetting(key){
  settings[key]=!settings[key];
  updateSettings();
}
function updateSettings(){
  document.getElementById('toggle-compliance').classList.toggle('on',settings.compliance);
  document.getElementById('toggle-guide').classList.toggle('on',settings.guide);
  try{localStorage.setItem('pasha_settings',JSON.stringify(settings))}catch(e){}
}
function loadSettings(){
  try{const s=JSON.parse(localStorage.getItem('pasha_settings'));if(s)Object.assign(settings,s)}catch(e){}
}

// ===== Boot =====
loadSettings();
init();

// PWA install
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
