<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>契約書署名 — ポン</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #6c6af6;
      --accent2: #a78bfa;
      --success: #34d399;
      --text: #e5e7eb;
      --text-muted: #6b7280;
      --text-dim: #374151;
      --red: #f87171;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* ── Main ── */
    .container { max-width: 700px; margin: 0 auto; padding: 20px 16px 100px; }

    /* ── Section ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }

    /* ── Contract text ── */
    .contract-text {
      font-size: 12px;
      white-space: pre-wrap;
      color: rgba(229,231,235,0.7);
      line-height: 1.8;
      max-height: 50vh;
      overflow-y: auto;
      padding: 4px 0;
    }
    .contract-text::-webkit-scrollbar { width: 4px; }
    .contract-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .no-data .emoji { font-size: 40px; margin-bottom: 12px; }

    /* ── Signature canvas ── */
    .canvas-wrap {
      position: relative;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      touch-action: none;
    }
    #sigCanvas {
      display: block;
      width: 100%;
      height: 160px;
      cursor: crosshair;
      touch-action: none;
    }
    .canvas-placeholder {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      color: #9ca3af;
      font-size: 13px;
      transition: opacity 0.2s;
    }
    .sig-controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .sig-controls select {
      flex: 1;
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .sig-controls select option { background: var(--card); }
    .btn-clear {
      padding: 8px 14px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Name field ── */
    .input-field {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text-muted); }

    /* ── CTA ── */
    .cta-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px 28px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      z-index: 99;
    }
    .btn-sign {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-sign:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-sign:active:not(:disabled) { opacity: 0.8; }

    /* ── Success screen ── */
    #successScreen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    #successScreen .check-circle {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--success), #059669);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    #successScreen h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    #successScreen p { color: var(--text-muted); font-size: 14px; line-height: 1.7; }
    .success-meta {
      margin-top: 24px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: left;
      font-size: 12px;
      color: var(--text-muted);
    }
    .success-meta span { color: var(--text); font-weight: 600; }

    /* ── Scrollable hint ── */
    .scroll-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    /* ── Type-signature toggle ── */
    .sig-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .sig-tab {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: all 0.2s;
    }
    .sig-tab.active {
      background: rgba(108,106,246,0.12);
      border-color: var(--accent);
      color: var(--accent);
    }
    #typeSignInput {
      display: none;
      width: 100%;
      padding: 20px 16px;
      background: #fff;
      border: none;
      border-radius: 10px;
      color: #111;
      font-size: 24px;
      font-family: 'Brush Script MT', 'Snell Roundhand', cursive;
      outline: none;
      text-align: center;
    }
    #typeSignInput::placeholder { color: #aaa; font-size: 14px; font-family: inherit; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">✍️</div>
  <div>
    <div class="header-title">ポン — 電子署名</div>
    <div class="header-sub">契約書の内容を確認して署名してください</div>
  </div>
</div>

<!-- Main content -->
<div class="container" id="mainContent">

  <!-- Contract text -->
  <div id="contractSection">
    <div class="section-label" style="margin-top:8px">契約書の内容</div>
    <div class="scroll-hint">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      スクロールして全文を確認してください
    </div>
    <div class="card" id="contractCard">
      <pre class="contract-text" id="contractText">読み込み中...</pre>
    </div>

    <!-- Info row -->
    <div class="card" id="contractMeta" style="display:none">
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div>
          <div class="section-label">相手方</div>
          <div style="font-size:14px;font-weight:600" id="metaClient">—</div>
        </div>
        <div>
          <div class="section-label">タイトル</div>
          <div style="font-size:14px;font-weight:600" id="metaTitle">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Signer name -->
  <div class="section-label" style="margin-top:4px">署名者のお名前</div>
  <div style="margin-bottom:14px">
    <input class="input-field" id="signerName" type="text" placeholder="氏名を入力してください" autocomplete="name">
  </div>

  <!-- Signature area -->
  <div class="section-label">電子署名</div>

  <div class="sig-tabs">
    <button class="sig-tab active" id="tabDraw" onclick="switchTab('draw')">✍️ 手書き</button>
    <button class="sig-tab" id="tabType" onclick="switchTab('type')">⌨️ テキスト</button>
  </div>

  <div class="card" style="padding:12px">
    <!-- Draw -->
    <div id="drawSection">
      <div class="canvas-wrap">
        <canvas id="sigCanvas"></canvas>
        <div class="canvas-placeholder" id="canvasHint">ここに署名を描いてください</div>
      </div>
      <div class="sig-controls">
        <select id="penColor">
          <option value="#1a1a2e">ブラック</option>
          <option value="#1e3a8a">ネイビー</option>
          <option value="#7c3aed">パープル</option>
        </select>
        <button class="btn-clear" onclick="clearCanvas()">クリア</button>
      </div>
    </div>

    <!-- Type -->
    <div id="typeSection" style="display:none">
      <input id="typeSignInput" type="text" placeholder="名前を入力（手書き風フォント）" oninput="onTypeInput()">
    </div>
  </div>

  <!-- Agreement -->
  <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:14px">
    <input type="checkbox" id="agreeCheck" style="margin-top:3px;accent-color:var(--accent);width:16px;height:16px;cursor:pointer" onchange="updateSignBtn()">
    <label for="agreeCheck" style="font-size:12px;color:var(--text-muted);cursor:pointer;line-height:1.6">
      上記の契約内容を確認し、内容に同意した上で電子署名を行うことを宣言します。
    </label>
  </div>

</div><!-- /container -->

<!-- Success screen (hidden initially) -->
<div id="successScreen">
  <div class="check-circle">✓</div>
  <h2>署名完了</h2>
  <p>電子署名が正常に完了しました。<br>契約書の控えはこのページを保存してください。</p>
  <div class="success-meta" id="successMeta"></div>
</div>

<!-- CTA -->
<div class="cta-bar" id="ctaBar">
  <button class="btn-sign" id="signBtn" onclick="submitSignature()" disabled>
    ✍️ &nbsp;署名する
  </button>
</div>

<script>
// ── URL param decoding ──────────────────────────────────────────────
function decodeBase64Url(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4 !== 0) str += '=';
  try {
    return decodeURIComponent(escape(atob(str)));
  } catch(e) {
    return null;
  }
}

const params = new URLSearchParams(window.location.search);
const dataParam = params.get('data');

let contractTitle = '', contractClient = '', contractBody = '';

if (dataParam) {
  const decoded = decodeBase64Url(dataParam);
  if (decoded) {
    const parts = decoded.split('\x1F');
    contractTitle  = parts[0] || '';
    contractClient = parts[1] || '';
    contractBody   = parts[2] || '';
  }
}

// Render
const contractEl = document.getElementById('contractText');
if (contractBody) {
  contractEl.textContent = contractBody;
} else if (dataParam) {
  contractEl.textContent = decodeBase64Url(dataParam) || '（契約書の読み込みに失敗しました）';
} else {
  contractEl.textContent = '契約書データが見つかりません。\n送信元に正しいリンクの再発行をご依頼ください。';
}

if (contractTitle || contractClient) {
  document.getElementById('contractMeta').style.display = 'block';
  document.getElementById('metaTitle').textContent  = contractTitle  || '—';
  document.getElementById('metaClient').textContent = contractClient || '—';
}

// ── Canvas setup ────────────────────────────────────────────────────
const canvas = document.getElementById('sigCanvas');
const ctx    = canvas.getContext('2d');
let drawing  = false;
let hasSig   = false;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  ctx.lineCap   = 'round';
  ctx.lineJoin  = 'round';
  ctx.lineWidth = 2.2;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); hasSig = false; });

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.strokeStyle = document.getElementById('penColor').value;
}
function draw(e) {
  if (!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  hasSig = true;
  document.getElementById('canvasHint').style.opacity = '0';
  updateSignBtn();
}
function endDraw(e) { drawing = false; }

canvas.addEventListener('mousedown',  startDraw, { passive: false });
canvas.addEventListener('mousemove',  draw,      { passive: false });
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove',  draw,      { passive: false });
canvas.addEventListener('touchend',   endDraw,   { passive: false });

function clearCanvas() {
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  ctx.clearRect(0, 0, w, h);
  hasSig = false;
  document.getElementById('canvasHint').style.opacity = '1';
  updateSignBtn();
}

// ── Tab switch ──────────────────────────────────────────────────────
let sigMode = 'draw';
function switchTab(mode) {
  sigMode = mode;
  document.getElementById('tabDraw').classList.toggle('active', mode === 'draw');
  document.getElementById('tabType').classList.toggle('active', mode === 'type');
  document.getElementById('drawSection').style.display = mode === 'draw' ? '' : 'none';
  document.getElementById('typeSection').style.display = mode === 'type' ? '' : 'none';
  document.getElementById('typeSignInput').style.display = mode === 'type' ? '' : 'none';
  if (mode === 'type') document.getElementById('typeSignInput').style.display = 'block';
  updateSignBtn();
}

function onTypeInput() { updateSignBtn(); }

// ── Validation ──────────────────────────────────────────────────────
function updateSignBtn() {
  const name    = document.getElementById('signerName').value.trim();
  const agreed  = document.getElementById('agreeCheck').checked;
  const hasDraw = (sigMode === 'draw' && hasSig);
  const hasType = (sigMode === 'type' && document.getElementById('typeSignInput').value.trim().length > 0);
  document.getElementById('signBtn').disabled = !(name && agreed && (hasDraw || hasType));
}
document.getElementById('signerName').addEventListener('input', updateSignBtn);

// ── Submit ──────────────────────────────────────────────────────────
function submitSignature() {
  const name   = document.getElementById('signerName').value.trim();
  const agreed = document.getElementById('agreeCheck').checked;
  if (!name || !agreed) return;

  // Capture signature image
  let sigData = '';
  if (sigMode === 'draw') {
    sigData = canvas.toDataURL('image/png');
  } else {
    const typed = document.getElementById('typeSignInput').value.trim();
    // Render typed name to a temp canvas
    const tmp = document.createElement('canvas');
    tmp.width = 400; tmp.height = 80;
    const tc = tmp.getContext('2d');
    tc.fillStyle = '#fff';
    tc.fillRect(0, 0, 400, 80);
    tc.fillStyle = '#1a1a2e';
    tc.font = "36px 'Brush Script MT', cursive";
    tc.textBaseline = 'middle';
    tc.fillText(typed, 20, 40);
    sigData = tmp.toDataURL('image/png');
  }

  const record = {
    signerName: name,
    signedAt:   new Date().toISOString(),
    contractTitle,
    contractClient,
    sigData,
    userAgent: navigator.userAgent,
  };
  localStorage.setItem('pon_signature_' + Date.now(), JSON.stringify(record));

  // Show success
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('ctaBar').style.display      = 'none';
  const ss = document.getElementById('successScreen');
  ss.style.display = 'block';

  const fmt = new Date().toLocaleString('ja-JP', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
  document.getElementById('successMeta').innerHTML =
    `<div style="margin-bottom:6px">署名者: <span>${escHtml(name)}</span></div>` +
    `<div style="margin-bottom:6px">署名日時: <span>${fmt}</span></div>` +
    (contractTitle  ? `<div style="margin-bottom:6px">契約書: <span>${escHtml(contractTitle)}</span></div>` : '') +
    (contractClient ? `<div>依頼元: <span>${escHtml(contractClient)}</span></div>` : '');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
