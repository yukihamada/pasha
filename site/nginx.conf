server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript;

    location = /charin {
        try_files /charin.html =404;
    }
    location = /pon {
        try_files /pon.html =404;
    }
    location = /poi {
        try_files /poi.html =404;
    }
    location = /suite {
        try_files /suite.html =404;
    }
    location = /sakutsu {
        try_files /sakutsu.html =404;
    }
    location = /privacy {
        try_files /privacy.html =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
